name: backend-ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Phase 0 阶段：pom.xml 尚未引入（P1-T01 才会落地）。
  # 该 guard job 在 P0 防止整个 workflow 因缺少构建文件而红。
  skeleton-guard:
    name: P0 skeleton guard
    runs-on: ubuntu-latest
    if: hashFiles('pom.xml') == ''
    steps:
      - uses: actions/checkout@v4
      - name: Notice
        run: |
          echo "::notice title=Phase 0::pom.xml 尚未引入；待 P1-T01 落地后启用 mvn verify。"

  verify:
    name: mvn verify (Java 21)
    runs-on: ubuntu-latest
    if: hashFiles('pom.xml') != ''
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Show toolchain
        run: |
          java -version
          mvn -v

      # ArchUnit + Testcontainers + Flyway 校验均跑在 verify 生命周期内：
      #   - ArchUnit 守护见 maildesk-domain/src/test/java/.../arch/
      #   - Testcontainers 自动拉起 PG 16 (无需 docker service)
      #   - Flyway migrate 在集成测试启动时执行
      - name: mvn -B verify
        run: mvn -B -ntp verify

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/**'
          retention-days: 7

      - name: Upload Failsafe reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: '**/target/failsafe-reports/**'
          retention-days: 7
