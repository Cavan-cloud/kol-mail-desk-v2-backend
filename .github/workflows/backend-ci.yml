name: backend-ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

# hashFiles() 在 job-level if 不可用，只能在 step-level if 用 → 全部 step 用 if 守护。
# Phase 0 阶段 pom.xml 尚未引入（P1-T01 才落地），skeleton-guard step 会绿条通过。
# pom.xml 一旦存在（P1-T01 之后），mvn verify 自动接管。

jobs:
  ci:
    name: backend-ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: P0 skeleton guard (no pom.xml yet)
        if: hashFiles('pom.xml') == ''
        run: |
          echo "::notice title=Phase 0::pom.xml 尚未引入；待 P1-T01 落地后自动启用 mvn verify。"

      - name: Set up JDK 21 (Temurin)
        if: hashFiles('pom.xml') != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Show toolchain
        if: hashFiles('pom.xml') != ''
        run: |
          java -version
          mvn -v

      # ArchUnit + Testcontainers + Flyway 校验均跑在 verify 生命周期内：
      #   - ArchUnit 守护见 maildesk-domain/src/test/java/.../arch/
      #   - Testcontainers 自动拉起 PG 16（无需 docker service）
      #   - Flyway migrate 在集成测试启动时执行
      - name: mvn -B verify
        if: hashFiles('pom.xml') != ''
        run: mvn -B -ntp verify

      - name: Upload Surefire reports
        if: failure() && hashFiles('pom.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/**'
          retention-days: 7

      - name: Upload Failsafe reports
        if: failure() && hashFiles('pom.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: '**/target/failsafe-reports/**'
          retention-days: 7

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: ci
    if: hashFiles('Dockerfile') != ''
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build --build-arg BUILD_MODULE=maildesk-api -t maildesk-api:ci .

      - name: Build Worker image
        run: docker build --build-arg BUILD_MODULE=maildesk-worker --build-arg HEALTH_CHECK_PORT=8081 -t maildesk-worker:ci .

  helm-lint:
    name: helm-lint
    runs-on: ubuntu-latest
    if: hashFiles('deploy/helm/maildesk/Chart.yaml') != ''
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: helm lint
        run: |
          helm lint deploy/helm/maildesk \
            --set database.host=postgres.maildesk.svc \
            --set redis.host=redis.maildesk.svc \
            --set config.corsAllowedOrigins=https://app.example.com \
            --set config.webRedirectUrl=https://app.example.com/

      - name: helm template (dry render)
        run: |
          helm template maildesk deploy/helm/maildesk \
            --namespace maildesk \
            --set database.host=postgres.maildesk.svc \
            --set redis.host=redis.maildesk.svc \
            --set config.corsAllowedOrigins=https://app.example.com \
            --set config.webRedirectUrl=https://app.example.com/ \
            > /tmp/maildesk-rendered.yaml
          test -s /tmp/maildesk-rendered.yaml
          helm template maildesk deploy/helm/maildesk \
            --namespace maildesk \
            -f deploy/helm/maildesk/values-prod.example.yaml \
            --set database.host=postgres.maildesk.svc \
            --set redis.host=redis.maildesk.svc \
            > /tmp/maildesk-prod-rendered.yaml
          test -s /tmp/maildesk-prod-rendered.yaml
          grep -q 'kind: ExternalSecret' /tmp/maildesk-prod-rendered.yaml
          grep -q 'kind: SecretStore' /tmp/maildesk-prod-rendered.yaml

      - name: guard no plaintext secrets in deploy/
        run: chmod +x deploy/scripts/guard-no-plaintext-secrets.sh && deploy/scripts/guard-no-plaintext-secrets.sh
