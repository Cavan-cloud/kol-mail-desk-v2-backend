spring:
  application:
    name: maildesk-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:maildesk}
    username: ${DB_USER:maildesk}
    password: ${DB_PASSWORD:maildesk_local}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
            # OpenID Connect baseline + Gmail read/send. v3.3 §登录 requires
            # gmail.readonly + gmail.send; users must accept both at consent.
            scope:
              - openid
              - email
              - profile
              - https://www.googleapis.com/auth/gmail.readonly
              - https://www.googleapis.com/auth/gmail.send
            # Spring rewrites {baseUrl} at runtime.
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_UUID
      # Logic delete: deleted_at TIMESTAMPTZ. "null" + "now()" make MP emit
      # "WHERE deleted_at IS NULL" on reads and "SET deleted_at = now()" on
      # logical deletes (BaseMapper#deleteById).
      logic-delete-field: deletedAt
      logic-delete-value: "now()"
      logic-not-delete-value: "null"
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

maildesk:
  # V3 seeded the dev tenant 00000000-0000-0000-0000-000000000001. Override per
  # env via DEFAULT_TENANT_ID. Consumed by MaildeskTenantLineHandler as the
  # fallback when no TenantContext is bound on the current thread.
  default-tenant-id: ${DEFAULT_TENANT_ID:00000000-0000-0000-0000-000000000001}

  # AES-256-GCM master key for integration_credentials.encrypted_payload.
  # MUST be set; generate via `openssl rand -base64 32`. App fail-fasts at
  # startup if missing / wrong length (see TokenEncryptionService).
  token-encryption-key: ${TOKEN_ENCRYPTION_KEY:}

  cors:
    # CSV of allowed origins. Multi-value via comma. Reflected in the CORS
    # filter; credentials are allowed so the SPA can send the session cookie.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  session:
    # Sliding TTL of the opaque MAILDESK_SESSION cookie (and its Redis entry).
    ttl-seconds: 604800
    # In prod set true (HTTPS only). Dev defaults to false so localhost works.
    cookie-secure: ${SESSION_COOKIE_SECURE:false}
    cookie-same-site: ${SESSION_COOKIE_SAME_SITE:Lax}

  web:
    # Where to land users after a successful OAuth callback. Override per env.
    redirect-url: ${WEB_REDIRECT_URL:http://localhost:3000/}
