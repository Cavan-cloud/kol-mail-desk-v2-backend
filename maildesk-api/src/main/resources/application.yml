spring:
  application:
    name: maildesk-api
  config:
    import: optional:classpath:application-observability.yml

  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  ai:
    # ADR-007: multi-provider routing via maildesk.ai.* — disable single OpenAI auto-config.
    openai:
      api-key: disabled
      chat:
        enabled: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:maildesk}
    username: ${DB_USER:maildesk}
    password: ${DB_PASSWORD:maildesk_local}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
            # OpenID Connect baseline + Gmail read/send. v3.3 §登录 requires
            # gmail.readonly + gmail.send; users must accept both at consent.
            scope:
              - openid
              - email
              - profile
              - https://www.googleapis.com/auth/gmail.readonly
              - https://www.googleapis.com/auth/gmail.send
            # Spring rewrites {baseUrl} at runtime.
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_UUID
      # Logic delete: deleted_at TIMESTAMPTZ. "null" + "now()" make MP emit
      # "WHERE deleted_at IS NULL" on reads and "SET deleted_at = now()" on
      # logical deletes (BaseMapper#deleteById).
      logic-delete-field: deletedAt
      logic-delete-value: "now()"
      logic-not-delete-value: "null"
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

maildesk:
  # V3 seeded the dev tenant 00000000-0000-0000-0000-000000000001. Override per
  # env via DEFAULT_TENANT_ID. Consumed by MaildeskTenantLineHandler as the
  # fallback when no TenantContext is bound on the current thread.
  default-tenant-id: ${DEFAULT_TENANT_ID:00000000-0000-0000-0000-000000000001}

  # AES-256-GCM master key for integration_credentials.encrypted_payload.
  # MUST be set; generate via `openssl rand -base64 32`. App fail-fasts at
  # startup if missing / wrong length (see TokenEncryptionService).
  token-encryption-key: ${TOKEN_ENCRYPTION_KEY:}

  cors:
    # CSV of allowed origins. Multi-value via comma. Reflected in the CORS
    # filter; credentials are allowed so the SPA can send the session cookie.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  session:
    # Sliding TTL of the opaque MAILDESK_SESSION cookie (and its Redis entry).
    ttl-seconds: 604800
    # In prod set true (HTTPS only). Dev defaults to false so localhost works.
    cookie-secure: ${SESSION_COOKIE_SECURE:false}
    cookie-same-site: ${SESSION_COOKIE_SAME_SITE:Lax}

  web:
    # Where to land users after a successful OAuth callback. Override per env.
    redirect-url: ${WEB_REDIRECT_URL:http://localhost:3000/}

  feishu:
    app-id: ${FEISHU_APP_ID:}
    app-secret: ${FEISHU_APP_SECRET:}
    kol-app-token: ${FEISHU_KOL_APP_TOKEN:}
    kol-table-id: ${FEISHU_KOL_TABLE_ID:}
    sync-source: ${FEISHU_SYNC_SOURCE:bitable}
    tab-filter: ${FEISHU_TAB_FILTER:roster}
    regional-tab-names: ${FEISHU_REGIONAL_TAB_NAMES:欧美,拉美,韩国}
    sheet-recent-months: ${FEISHU_SHEET_RECENT_MONTHS:2}
    full-sync: ${FEISHU_FULL_SYNC:true}
    connect-timeout: 10s
    read-timeout: 30s
    max-retries: 3

  workbench:
    # own_only | leader_only | non_intern
    # non_intern（默认）：除实习生外可读他人 Gmail 同步的邮件；实习生仍仅看自己邮箱。
    # leader_only：仅 Leader 可读跨邮箱；own_only：人人仅看自己（旧行为）。
    cross-mailbox-visibility: ${WORKBENCH_CROSS_MAILBOX_VISIBILITY:non_intern}

  gmail:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
    connect-timeout: 10s
    read-timeout: 30s
    max-retries: 3
    # false = Gmail 同步不调 LLM，仅按 inbound/outbound 区分待回复；手动「重新分析」仍走 AI
    ai-classification-enabled: ${GMAIL_AI_CLASSIFICATION_ENABLED:false}

  ai:
    enabled: true
    default-provider: ${AI_DEFAULT_PROVIDER:deepseek}
    providers:
      moonshot:
        base-url: ${MOONSHOT_BASE_URL:https://api.moonshot.cn}
        api-key: ${MOONSHOT_API_KEY:}
      deepseek:
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
        api-key: ${DEEPSEEK_API_KEY:}
    capabilities:
      classify:
        provider: deepseek
        model: deepseek-v4-flash
        fallback-provider: moonshot
        fallback-model: moonshot-v1-8k
      draft:
        provider: deepseek
        model: deepseek-v4-pro
        fallback-provider: moonshot
        fallback-model: moonshot-v1-128k
      check:
        provider: deepseek
        model: deepseek-v4-flash
        fallback-provider: moonshot
        fallback-model: moonshot-v1-8k
      translate:
        provider: deepseek
        model: deepseek-v4-flash
        fallback-provider: moonshot
        fallback-model: moonshot-v1-8k
