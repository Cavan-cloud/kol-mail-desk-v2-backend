spring:
  application:
    name: maildesk-worker
  config:
    import: optional:classpath:application-observability.yml

  ai:
    openai:
      api-key: disabled
      chat:
        enabled: false

  # See maildesk-api/src/main/resources/application.yml — same forward-looking
  # comment. Worker also excludes DataSourceAutoConfiguration until infrastructure
  # is wired in.
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:maildesk}
    username: ${DB_USER:maildesk}
    password: ${DB_PASSWORD:maildesk_local}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

management:
  # Worker has no spring-boot-starter-web; expose actuator on a dedicated port for
  # Docker / K8s health probes (see docker-compose.app.yml).
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_UUID
      logic-delete-field: deletedAt
      logic-delete-value: "now()"
      logic-not-delete-value: "null"
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

maildesk:
  default-tenant-id: ${DEFAULT_TENANT_ID:00000000-0000-0000-0000-000000000001}

  # AES-256-GCM master key — required at boot (shared with api).
  token-encryption-key: ${TOKEN_ENCRYPTION_KEY:}

  worker:
    feishu-delta-sync:
      enabled: ${FEISHU_DELTA_SYNC_ENABLED:true}
      cron: "0 */30 * * * *"
      max-records: 50
      lock-ttl: 25m
    gmail-incremental-sync:
      enabled: ${GMAIL_INCREMENTAL_SYNC_ENABLED:true}
      cron: "0 */5 * * * *"
      max-users-per-run: 20
      lock-ttl: 4m
    scheduled-email-dispatch:
      enabled: ${SCHEDULED_EMAIL_DISPATCH_ENABLED:true}
      cron: "0 * * * * *"
      batch-size: 10
      lock-ttl: 55s

  feishu:
    app-id: ${FEISHU_APP_ID:}
    app-secret: ${FEISHU_APP_SECRET:}
    kol-app-token: ${FEISHU_KOL_APP_TOKEN:}
    kol-table-id: ${FEISHU_KOL_TABLE_ID:}
    sync-source: ${FEISHU_SYNC_SOURCE:bitable}
    tab-filter: ${FEISHU_TAB_FILTER:roster}
    regional-tab-names: ${FEISHU_REGIONAL_TAB_NAMES:欧美,拉美,韩国}
    sheet-recent-months: ${FEISHU_SHEET_RECENT_MONTHS:2}
    full-sync: ${FEISHU_FULL_SYNC:true}
    connect-timeout: 10s
    read-timeout: 30s
    max-retries: 3

  gmail:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
    connect-timeout: 10s
    read-timeout: 30s
    max-retries: 3

  ai:
    enabled: true
    default-provider: ${AI_DEFAULT_PROVIDER:moonshot}
    providers:
      moonshot:
        base-url: ${MOONSHOT_BASE_URL:https://api.moonshot.cn/v1}
        api-key: ${MOONSHOT_API_KEY:}
      deepseek:
        base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
        api-key: ${DEEPSEEK_API_KEY:}
    capabilities:
      classify:
        provider: moonshot
        model: moonshot-v1-8k
        fallback-provider: deepseek
        fallback-model: deepseek-v4-flash
      draft:
        provider: moonshot
        model: moonshot-v1-128k
      check:
        provider: moonshot
        model: moonshot-v1-8k
      translate:
        provider: moonshot
        model: moonshot-v1-8k
        fallback-provider: deepseek
        fallback-model: deepseek-v4-flash
