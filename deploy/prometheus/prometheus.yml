global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/maildesk.rules.yml

scrape_configs:
  - job_name: maildesk-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api:8080
        labels:
          application: maildesk-api

  - job_name: maildesk-worker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - worker:8081
        labels:
          application: maildesk-worker
