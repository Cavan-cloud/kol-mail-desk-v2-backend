{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.secretStore.create }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "maildesk.secretStoreName" . }}
  labels:
    {{- include "maildesk.labels" . | nindent 4 }}
spec:
  provider:
    {{- if eq .Values.externalSecrets.secretStore.provider "aws" }}
    aws:
      service: SecretsManager
      region: {{ required "externalSecrets.secretStore.aws.region is required for AWS" .Values.externalSecrets.secretStore.aws.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "maildesk.serviceAccountName" . }}
    {{- else if eq .Values.externalSecrets.secretStore.provider "gcpsm" }}
    gcpsm:
      projectID: {{ required "externalSecrets.secretStore.gcpsm.projectID is required for GCP" .Values.externalSecrets.secretStore.gcpsm.projectID }}
      auth:
        workloadIdentity:
          clusterLocation: {{ required "externalSecrets.secretStore.gcpsm.clusterLocation" .Values.externalSecrets.secretStore.gcpsm.clusterLocation }}
          clusterName: {{ required "externalSecrets.secretStore.gcpsm.clusterName" .Values.externalSecrets.secretStore.gcpsm.clusterName }}
          serviceAccountRef:
            name: {{ include "maildesk.serviceAccountName" . }}
    {{- else }}
    {{- fail (printf "unsupported externalSecrets.secretStore.provider %q (use aws or gcpsm)" .Values.externalSecrets.secretStore.provider) }}
    {{- end }}
{{- end }}
