{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maildesk.fullname" . }}-api
  labels:
    {{- include "maildesk.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "maildesk.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "maildesk.api.selectorLabels" . | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.api.podAnnotations .Values.metrics.prometheusScrape }}
      annotations:
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.metrics.prometheusScrape }}
        {{- include "maildesk.api.prometheusPodAnnotations" . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "maildesk.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.config.springProfilesActive | quote }}
            - name: SERVER_PORT
              value: {{ .Values.api.service.port | quote }}
            - name: DB_HOST
              value: {{ required "database.host is required" .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: DB_USER
              value: {{ .Values.database.user | quote }}
            - name: REDIS_HOST
              value: {{ required "redis.host is required" .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: DEFAULT_TENANT_ID
              value: {{ .Values.config.defaultTenantId | quote }}
            - name: AI_DEFAULT_PROVIDER
              value: {{ .Values.config.aiDefaultProvider | quote }}
            - name: MOONSHOT_BASE_URL
              value: {{ .Values.config.moonshotBaseUrl | quote }}
            - name: DEEPSEEK_BASE_URL
              value: {{ .Values.config.deepseekBaseUrl | quote }}
            - name: GMAIL_AI_CLASSIFICATION_ENABLED
              value: {{ .Values.config.gmailAiClassificationEnabled | default "false" | quote }}
            - name: WORKBENCH_CROSS_MAILBOX_VISIBILITY
              value: {{ .Values.config.crossMailboxVisibility | default "non_intern" | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ required "config.corsAllowedOrigins is required for API" .Values.config.corsAllowedOrigins | quote }}
            - name: WEB_REDIRECT_URL
              value: {{ required "config.webRedirectUrl is required for API" .Values.config.webRedirectUrl | quote }}
            - name: SESSION_COOKIE_SECURE
              value: {{ .Values.config.sessionCookieSecure | quote }}
            - name: SESSION_COOKIE_SAME_SITE
              value: {{ .Values.config.sessionCookieSameSite | quote }}
            {{- include "maildesk.feishuEnv" . | nindent 12 }}
            {{- include "maildesk.secretEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.api.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.api.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
