{{- if .Values.externalSecrets.enabled }}
{{- if .Values.secrets.create }}
{{- fail "externalSecrets.enabled requires secrets.create=false — never commit plaintext secrets to Helm values in production" }}
{{- end }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "maildesk.secretName" . }}
  labels:
    {{- include "maildesk.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "maildesk.secretStoreName" . }}
    kind: SecretStore
  target:
    name: {{ include "maildesk.secretName" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    {{- range .Values.externalSecrets.keys }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ $.Values.externalSecrets.remoteRef.secretName | quote }}
        {{- if .remoteKey }}
        property: {{ .remoteKey | quote }}
        {{- end }}
    {{- end }}
{{- end }}
