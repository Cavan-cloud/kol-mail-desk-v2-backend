{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maildesk.fullname" . }}-worker
  labels:
    {{- include "maildesk.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "maildesk.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "maildesk.worker.selectorLabels" . | nindent 8 }}
        {{- with .Values.worker.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.worker.podAnnotations .Values.metrics.prometheusScrape }}
      annotations:
        {{- with .Values.worker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.metrics.prometheusScrape }}
        {{- include "maildesk.worker.prometheusPodAnnotations" . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "maildesk.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          ports:
            - name: management
              containerPort: {{ .Values.worker.managementPort }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.config.springProfilesActive | quote }}
            - name: MANAGEMENT_SERVER_PORT
              value: {{ .Values.worker.managementPort | quote }}
            - name: DB_HOST
              value: {{ required "database.host is required" .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: DB_USER
              value: {{ .Values.database.user | quote }}
            - name: REDIS_HOST
              value: {{ required "redis.host is required" .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: DEFAULT_TENANT_ID
              value: {{ .Values.config.defaultTenantId | quote }}
            - name: AI_DEFAULT_PROVIDER
              value: {{ .Values.config.aiDefaultProvider | quote }}
            - name: MOONSHOT_BASE_URL
              value: {{ .Values.config.moonshotBaseUrl | quote }}
            - name: DEEPSEEK_BASE_URL
              value: {{ .Values.config.deepseekBaseUrl | quote }}
            {{- include "maildesk.feishuEnv" . | nindent 12 }}
            {{- include "maildesk.secretEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.worker.probes.liveness.path }}
              port: management
            initialDelaySeconds: {{ .Values.worker.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.worker.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.worker.probes.readiness.path }}
              port: management
            initialDelaySeconds: {{ .Values.worker.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.worker.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
