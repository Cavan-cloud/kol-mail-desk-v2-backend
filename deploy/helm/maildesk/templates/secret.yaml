{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  labels:
    {{- include "maildesk.labels" . | nindent 4 }}
type: Opaque
stringData:
  token-encryption-key: {{ required "secrets.tokenEncryptionKey is required when secrets.create=true" .Values.secrets.tokenEncryptionKey | quote }}
  db-password: {{ required "secrets.dbPassword is required when secrets.create=true" .Values.secrets.dbPassword | quote }}
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  google-oauth-client-id: {{ .Values.secrets.googleOauthClientId | quote }}
  google-oauth-client-secret: {{ .Values.secrets.googleOauthClientSecret | quote }}
  feishu-app-id: {{ .Values.secrets.feishuAppId | quote }}
  feishu-app-secret: {{ .Values.secrets.feishuAppSecret | quote }}
  feishu-kol-app-token: {{ .Values.secrets.feishuKolAppToken | quote }}
  feishu-kol-table-id: {{ .Values.secrets.feishuKolTableId | quote }}
  moonshot-api-key: {{ .Values.secrets.moonshotApiKey | quote }}
  deepseek-api-key: {{ .Values.secrets.deepseekApiKey | quote }}
{{- end }}
